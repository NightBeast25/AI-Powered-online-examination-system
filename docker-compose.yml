version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_system
    # Using specific root password for docker compose
    # Wait for the next db steps to finish script loading
    command: --default-authentication-plugin=caching_sha2_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialization scripts
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./database/triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./database/views.sql:/docker-entrypoint-initdb.d/04_views.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/05_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
